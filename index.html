<html lang="pt">

    <meta charset="UTF-8">

    <title>Route 14 Bus Tracker - Alameda to Alvor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .location-section {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .location-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-icon.active {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .select-wrapper {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .route-info {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .route-info.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .route-info h3 {
            color: #065f46;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #d1fae5;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6b7280;
            font-weight: 500;
        }

        .info-value {
            color: #065f46;
            font-weight: 600;
        }

        .next-buses {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #d1fae5;
        }

        .bus-time {
            background: white;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-large {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .time-info {
            font-size: 14px;
            color: #6b7280;
        }

        .error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            color: #991b1b;
            margin-bottom: 20px;
        }

        .coordinates {
            font-size: 12px;
            color: #6b7280;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>

        const route34InSchedule = [

        ];

        let currentRoute = "14-out";
        let busStops = route14OutStops;
        let busSchedule = route14OutSchedule;
        let userLocation = null;

        function changeRoute() {
            currentRoute = document.getElementById('routeSelect').value;
            
            if (currentRoute === "14-out") {
                busStops = route14OutStops;
                busSchedule = route14OutSchedule;
            } else if (currentRoute === "14-in") {
                busStops = route14InStops;
                busSchedule = route14InSchedule;
            } else if (currentRoute === "11-out") {
                busStops = route11OutStops;
                busSchedule = route11OutSchedule;
            } else if (currentRoute === "11-in") {
                busStops = route11InStops;
                busSchedule = route11InSchedule;
            } else if (currentRoute === "34-out") {
                busStops = route34OutStops;
                busSchedule = route34OutSchedule;
            } else if (currentRoute === "34-in") {
                busStops = route34InStops;
                busSchedule = route34InSchedule;
            }
            
            populateStops();
            document.getElementById('routeInfo').classList.remove('show');
            
            // Re-find nearest stop if location is available
            if (userLocation) {
                const nearest = findNearestStop(userLocation.lat, userLocation.lon);
                document.getElementById('fromStop').value = nearest.stop.index;
                
                const distanceM = (nearest.distance * 1000).toFixed(0);
                document.getElementById('locationStatus').innerHTML = 
                    `Nearest stop: <strong>${nearest.stop.name}</strong> (${distanceM}m away)`;
            }
        }

        function populateStops() {
            const fromSelect = document.getElementById('fromStop');
            const toSelect = document.getElementById('toStop');

            // Clear existing options except first
            fromSelect.innerHTML = '<option value="">-- Select your starting stop --</option>';
            toSelect.innerHTML = '<option value="">-- Select your destination --</option>';

            busStops.forEach(stop => {
                const option1 = document.createElement('option');
                option1.value = stop.index;
                option1.textContent = stop.name;
                fromSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = stop.index;
                option2.textContent = stop.name;
                toSelect.appendChild(option2);
            });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the Earth in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function findNearestStop(lat, lon) {
            let nearest = null;
            let minDistance = Infinity;

            busStops.forEach(stop => {
                const distance = calculateDistance(lat, lon, stop.lat, stop.lon);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = stop;
                }
            });

            return { stop: nearest, distance: minDistance };
        }

        function getLocation() {
            const statusIcon = document.getElementById('statusIcon');
            const locationStatus = document.getElementById('locationStatus');
            const errorMessage = document.getElementById('errorMessage');
            const btn = document.getElementById('locationBtn');

            errorMessage.innerHTML = '';
            btn.disabled = true;
            btn.textContent = '📡 Getting location...';

            if (!navigator.geolocation) {
                errorMessage.innerHTML = '<div class="error">Geolocation is not supported by your browser</div>';
                btn.disabled = false;
                btn.textContent = '📍 Get My Location';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };

                    statusIcon.classList.add('active');
                    locationStatus.textContent = 'Location found!';
                    
                    document.getElementById('coordinates').textContent = 
                        `Lat: ${userLocation.lat.toFixed(6)}, Lon: ${userLocation.lon.toFixed(6)}`;

                    const nearest = findNearestStop(userLocation.lat, userLocation.lon);
                    
                    document.getElementById('fromStop').value = nearest.stop.index;
                    
                    const distanceKm = nearest.distance.toFixed(2);
                    const distanceM = (nearest.distance * 1000).toFixed(0);
                    
                    locationStatus.innerHTML = `Nearest stop: <strong>${nearest.stop.name}</strong> (${distanceM}m away)`;
                    
                    btn.textContent = '✓ Location Updated';
                    btn.disabled = false;

                    calculateRoute();
                },
                (error) => {
                    let errorMsg = 'Unable to retrieve your location';
                    
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Location permission denied. Please enable location access.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Location information unavailable.';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Location request timed out.';
                            break;
                    }
                    
                    errorMessage.innerHTML = `<div class="error">${errorMsg}</div>`;
                    statusIcon.classList.remove('active');
                    locationStatus.textContent = 'Location not available';
                    btn.disabled = false;
                    btn.textContent = '📍 Get My Location';
                }
            );
        }

        function getNextBuses(stopIndex) {
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            const nextBuses = [];
            
            busSchedule.forEach(time => {
                const [hours, minutes] = time.split(':').map(Number);
                const departureMinutes = hours * 60 + minutes;
                const arrivalMinutes = departureMinutes + stopIndex; // 1 minute per stop
                
                if (arrivalMinutes >= currentMinutes) {
                    const arrivalHours = Math.floor(arrivalMinutes / 60);
                    const arrivalMins = arrivalMinutes % 60;
                    const arrivalTime = `${String(arrivalHours).padStart(2, '0')}:${String(arrivalMins).padStart(2, '0')}`;
                    
                    const waitMinutes = arrivalMinutes - currentMinutes;
                    
                    nextBuses.push({
                        time: arrivalTime,
                        wait: waitMinutes
                    });
                }
            });
            
            return nextBuses.slice(0, 3);
        }

        function calculateRoute() {
            const fromIndex = parseInt(document.getElementById('fromStop').value);
            const toIndex = parseInt(document.getElementById('toStop').value);
            const routeInfo = document.getElementById('routeInfo');

            if (isNaN(fromIndex) || isNaN(toIndex)) {
                routeInfo.classList.remove('show');
                return;
            }

            if (fromIndex >= toIndex) {
                document.getElementById('errorMessage').innerHTML = 
                    '<div class="error">Please select a destination that comes after your starting point on the route.</div>';
                routeInfo.classList.remove('show');
                return;
            }

            document.getElementById('errorMessage').innerHTML = '';

            const fromStop = busStops[fromIndex];
            const toStop = busStops[toIndex];
            const stopsCount = toIndex - fromIndex;
            const travelTime = stopsCount; // 1 minute per stop

            document.getElementById('fromDisplay').textContent = fromStop.name;
            document.getElementById('toDisplay').textContent = toStop.name;
            document.getElementById('stopsCount').textContent = stopsCount;
            document.getElementById('travelTime').textContent = `${travelTime} minutes`;

            const nextBuses = getNextBuses(fromIndex);
            const busTimesDiv = document.getElementById('busTimes');
            
            if (nextBuses.length === 0) {
                busTimesDiv.innerHTML = '<div class="bus-time"><span class="info-label">No more buses today</span></div>';
            } else {
                busTimesDiv.innerHTML = nextBuses.map(bus => `
                    <div class="bus-time">
                        <span class="time-large">${bus.time}</span>
                        <span class="time-info">in ${bus.wait} min</span>
                    </div>
                `).join('');
            }

            routeInfo.classList.add('show');
        }

        // Initialize
        populateStops();
